name: kora
description: "KoraStore - Modern E-Commerce App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  http: ^1.3.0
  provider: ^6.1.4
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/kora-logo.svg"
  macos:
    generate: true
    image_path: "assets/images/kora-logo.svg"
  image_path: "assets/images/kora-logo.svg"
  remove_alpha_ios: true
